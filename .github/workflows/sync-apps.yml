name: Auto Merge and Update Custom Apps

on:
  push:
    paths:
      - 'apps/**'                 # 🌟 只有当你或者 AI 在专属 apps 目录下放了新 JSON 时才触发
  schedule:
    - cron: '0 */4 * * *'         # 每 4 小时自动巡检一次
  workflow_dispatch:              # 支持随时手动点按钮触发

permissions: write-all

jobs:
  merge_and_update:
    runs-on: windows-latest       # 运行 Scoop 的 checkver 引擎必须用 Windows 环境
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Automatically Copy Apps to Bucket & Update
        shell: pwsh
        run: |
          # 1. 确保标准 bucket 文件夹存在
          if (!(Test-Path "bucket")) { New-Item -ItemType Directory -Path "bucket" | Out-Null }
          
          # 2. 🌟 机器人核心动作：把你专属自留地 apps/ 里的所有 JSON，全自动复制到正式的 bucket/ 目录下
          if (Test-Path "apps") {
              echo "🚚 正在将 apps/ 目录下的自建软件自动合并到正式 bucket/ 生产线..."
              Copy-Item -Path "apps\*.json" -Destination "bucket\" -Force -ErrorAction SilentlyContinue
          }
          
          # 3. 临时拉取 Scoop 核心用来调用底层的 checkver 引擎
          git clone --depth=1 https://github.com/ScoopInstaller/Scoop.git temp_scoop
          
          # 4. 全自动遍历 bucket/ 目录下所有的 JSON 文件（包含你刚复制过去的），挨个检查更新
          Get-ChildItem "bucket\*.json" | ForEach-Object {
              # 为了节省 CI 时间，只有当文件里包含 checkver 规则时才去网络请求更新
              $content = Get-Content $_.FullName -Raw
              if ($content -match "checkver") {
                  echo "=========================================="
                  echo "🔍 正在检查软件版本: [$($_.BaseName)]"
                  echo "=========================================="
                  
                  # 🛠【修正 1】: 同时传入 -App (具体文件路径) 和 -Dir (所在的 bucket 目录)
                  # 显式告诉 checkver 它的工作目录，并使用当前的 pwsh 执行（不用切换回旧版 powershell）
                  pwsh .\temp_scoop\bin\checkver.ps1 -Update -App $_.FullName -Dir .\bucket
              }
          }
          
          # 🛠【修正 2】: 使用 Windows 兼容的语法安全删除临时文件夹，防止爆错
          if (Test-Path "temp_scoop") { Remove-Item -Recurse -Force temp_scoop }

      - name: 💾 Commit and Push Changes
        shell: bash
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 🌟 同时追踪 apps/ 和 bucket/ 的变动
          git add apps/ bucket/
          
          git commit -m "Apps Factory Maintenance: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
