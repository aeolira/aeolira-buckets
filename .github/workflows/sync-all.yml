name: Aggregate and Sync All Buckets

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: write-all

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🌟 核心升级：动态读取 sources.txt，有多少个源就自动循环同步多少个，完全解耦！
      - name: Parse and Sync All Buckets
        run: |
          # 确保 buckets 基础目录存在
          mkdir -p buckets
          
          # 逐行读取花名册，忽略空行和以 # 开头的注释行
          while IFS='|' read -r name url || [ -n "$name" ]; do
            [[ -z "$name" || "$name" =~ ^# ]] && continue
            
            echo "=========================================="
            echo "🚀 正在全自动同步源: [$name]"
            echo "🔗 链接: $url"
            echo "=========================================="
            
            # 1. 清理该源旧的文件目录
            rm -rf "buckets/$name"
            mkdir -p "buckets/$name"
            
            # 2. 注入 Token 克隆到临时目录（兼容大小写问题）
            # 将链接中的 github.com 替换为带有通行证的验证链接
            auth_url=$(echo "$url" | sed "s|github.com|x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com|g")
            
            if git clone --depth=1 "$auth_url" "temp_$name"; then
              # 3. 搬运所有的 json 配置文件
              if [ -d "temp_$name/bucket" ]; then
                cp -r temp_$name/bucket/* "buckets/$name/" 2>/dev/null || true
              else
                cp -r temp_$name/* "buckets/$name/" 2>/dev/null || true
              fi
              # 清理临时克隆包
              rm -rf "temp_$name"
              echo "✅ [$name] 同步成功！"
            else
              echo "❌ [$name] 克隆失败，请检查 sources.txt 中的链接是否正确。"
            fi
            
          done < sources.txt

      - name: Commit and Push to Your Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add buckets/
          git commit -m "Automated Sync: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
