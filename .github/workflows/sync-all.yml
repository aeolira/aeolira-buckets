name: Aggregate and Sync All Buckets

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: write-all

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4
        with:
          # 🌟 关键修正 1：显式传入本地 Token，让本地的 git 保持完全的认证状态
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clear old files
        run: |
          mkdir -p buckets/extras buckets/versions buckets/dorado
          rm -rf buckets/extras/* buckets/versions/* buckets/dorado/*

      - name: Sync Scoop-Extras
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/ScoopInstaller/extra.git temp_extras
          cp -r temp_extras/bucket/* buckets/extras/ 2>/dev/null || cp -r temp_extras/* buckets/extras/
          rm -rf temp_extras

      - name: Sync Scoop-Versions
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/ScoopInstaller/versions.git temp_versions
          cp -r temp_versions/bucket/* buckets/versions/ 2>/dev/null || cp -r temp_versions/* buckets/versions/
          rm -rf temp_versions

      - name: Sync Dorado
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/chawyehsu/dorado.git temp_dorado
          cp -r temp_dorado/bucket/* buckets/dorado/ 2>/dev/null || cp -r temp_dorado/* buckets/dorado/
          rm -rf temp_dorado

      - name: Commit and Push to Your Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add buckets/
          git commit -m "Automated Sync: $(date +'%Y-%m-%d %H:%M')" || exit 0
          
          # 🌟 关键修正 2：绝不使用模糊的 git push，而是强行带上临时通行证，精准推送到 main 分支
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
