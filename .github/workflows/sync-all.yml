name: Aggregate and Sync All Buckets

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 🌟 2026 最新标准：全局强制所有 Action 运行在 Node.js 24 上，彻底消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4

      - name: Clear old files
        run: |
          mkdir -p buckets/extras buckets/versions buckets/dorado
          rm -rf buckets/extras/* buckets/versions/* buckets/dorado/*

      - name: Sync Scoop-Extras
        run: |
          git clone --depth=1 https://github.com/ScoopInstaller/Extra.git temp_extras
          cp -r temp_extras/bucket/* buckets/extras/ 2>/dev/null || cp -r temp_extras/* buckets/extras/
          rm -rf temp_extras

      - name: Sync Scoop-Versions
        run: |
          git clone --depth=1 https://github.com/ScoopInstaller/Versions.git temp_versions
          cp -r temp_versions/bucket/* buckets/versions/ 2>/dev/null || cp -r temp_versions/* buckets/versions/
          rm -rf temp_versions

      - name: Sync Dorado
        run: |
          git clone --depth=1 https://github.com/chawyehsu/dorado.git temp_dorado
          cp -r temp_dorado/bucket/* buckets/dorado/ 2>/dev/null || cp -r temp_dorado/* buckets/dorado/
          rm -rf temp_dorado

      - name: Commit and Push to Your Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add buckets/
          git commit -m "Automated Sync: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
